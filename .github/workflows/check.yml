name: ISPARK check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Repository'yi indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri kur
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Kontrolü çalıştır
        run: python check.py

      - name: Ekran görüntüsünü yükle
        uses: actions/upload-artifact@v4
        with:
          name: ispark-screenshot
          path: ispark.png
