name: ISPARK check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Repository'yi indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Repository dosyalarını göster
        run: |
          pwd
          ls -la

      - name: Kontrolü çalıştır
        run: |
          python check.py

      - name: İşlem tamamlandı
        run: echo "Workflow tamamlandı."
